name: Update Latest Repo

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get latest pushed repo
        id: repo
        run: |
          repo=$(curl -s https://api.github.com/users/mrbeast-anirban/repos?sort=pushed\&per_page=1 | jq -r '.[0].name')
          echo "repo=$repo" >> $GITHUB_OUTPUT

      - name: Replace in README
        run: |
          sed -i "s/YOUR_LATEST_REPO/${{ steps.repo.outputs.repo }}/g" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Updated latest repo" || echo "No changes"
          git push
